version: 2

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: default
    env:
      - CGO_ENABLED=0
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    goamd64:
      - v1
      - v2
      - v3
      - v4
    main: .
    ldflags:
      - -s -w
      - -X github.com/bovinemagnet/gossm/cmd.Version={{.Version}}
      - -X github.com/bovinemagnet/gossm/cmd.Commit={{.Commit}}
      - -X github.com/bovinemagnet/gossm/cmd.Date={{.Date}}
  - id: homebrew
    env:
      - CGO_ENABLED=0
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    goamd64:
      - v1
    main: .
    ldflags:
      - -s -w
      - -X github.com/bovinemagnet/gossm/cmd.Version={{.Version}}
      - -X github.com/bovinemagnet/gossm/cmd.Commit={{.Commit}}
      - -X github.com/bovinemagnet/gossm/cmd.Date={{.Date}}

archives:
  - id: default
    ids:
      - default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64{{ .Amd64 }}
      {{- else }}{{ .Arch }}{{ end }}
  - id: homebrew
    ids:
      - homebrew
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
      {{- "_homebrew" }}

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Tag }}-next"

# changelog:
#   sort: asc
#   filters:
#     exclude:
#       - "^docs:"
#       - "^test:"
sboms:
  - artifacts: archive

changelog:
  sort: desc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
  groups:
    - title: Features
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 0
    - title: "Bug fixes"
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 1
    - title: "Enhancements"
      regexp: "^.*enhance[(\\w)]*:+.*$"
      order: 2
    - title: Others
      order: 999

# Homebrew cask configuration (replaces deprecated 'brews')
homebrew_casks:
  - name: gossm
    ids:
      - homebrew
    repository:
      owner: bovinemagnet
      name: homebrew-tap
      branch: main
    directory: Casks
    homepage: "https://github.com/bovinemagnet/gossm"
    description: "Tool to connect to aws resources."
    license: "MIT"

release:
  github:
    owner: bovinemagnet
    name: gossm
  draft: false
  prerelease: auto
  name_template: "{{.ProjectName}} v{{.Version}}"

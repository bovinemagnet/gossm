<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gossm — Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/static/htmx.min.js"></script>
    <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    </style>
</head>
<body class="bg-slate-900 text-slate-200 min-h-screen">
    <!-- Header -->
    <header class="bg-slate-800 border-b border-slate-700 shadow-lg">
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <h1 class="text-xl font-bold text-sky-400 tracking-tight">gossm</h1>
                <span class="text-xs text-slate-500 bg-slate-700 px-2 py-0.5 rounded">dashboard</span>
            </div>
            <div class="text-sm text-slate-400">
                Port <span class="text-slate-300 font-mono">{{.Port}}</span>
            </div>
        </div>
    </header>

    <!-- Main content -->
    <main class="max-w-7xl mx-auto px-4 py-6" hx-ext="sse" sse-connect="/events">
        {{block "content" .}}{{end}}
    </main>
</body>
</html>

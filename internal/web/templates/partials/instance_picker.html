{{define "instance_picker.html"}}
{{if .}}
<div class="instance-list" role="listbox" aria-label="Available instances">
    <div class="instance-list-head">
        <div>Name</div>
        <div>Instance ID</div>
        <div class="col-type">Type</div>
        <div>Private IP</div>
        <div class="col-az">AZ</div>
    </div>
    {{range .}}
    <div class="instance-row" role="option" tabindex="0"
         onclick="document.getElementById('instance_id').value='{{.InstanceID}}';document.getElementById('instance_name').value='{{.InstanceName}}';document.querySelectorAll('.instance-row').forEach(function(r){r.classList.remove('is-selected');r.setAttribute('aria-selected','false')});this.classList.add('is-selected');this.setAttribute('aria-selected','true');">
        <div class="name">{{.InstanceName}}</div>
        <div class="mono">{{.InstanceID}}</div>
        <div class="col-type muted">{{.InstanceType}}</div>
        <div class="mono">{{.PrivateIP}}</div>
        <div class="col-az muted">{{.AZ}}</div>
    </div>
    {{end}}
</div>
{{else}}
<div class="instance-picker-empty">No running instances found for this profile or filter.</div>
{{end}}
{{end}}

{{define "instance_picker.html"}}
{{if .}}
<div class="max-h-64 overflow-y-auto border border-slate-600 rounded-md">
    <table class="w-full text-sm">
        <thead class="sticky top-0 bg-slate-700">
            <tr class="text-left text-slate-400">
                <th class="px-3 py-2 font-medium">Name</th>
                <th class="px-3 py-2 font-medium">Instance ID</th>
                <th class="px-3 py-2 font-medium">Type</th>
                <th class="px-3 py-2 font-medium">Private IP</th>
                <th class="px-3 py-2 font-medium">AZ</th>
            </tr>
        </thead>
        <tbody>
            {{range .}}
            <tr class="border-t border-slate-700 hover:bg-slate-600 cursor-pointer instance-row"
                onclick="document.getElementById('instance_id').value='{{.InstanceID}}';document.getElementById('instance_name').value='{{.InstanceName}}';document.querySelectorAll('.instance-row').forEach(function(r){r.classList.remove('bg-sky-900','border-sky-500')});this.classList.add('bg-sky-900','border-sky-500');">
                <td class="px-3 py-2 text-slate-200">{{.InstanceName}}</td>
                <td class="px-3 py-2 font-mono text-xs text-slate-400">{{.InstanceID}}</td>
                <td class="px-3 py-2 text-slate-400">{{.InstanceType}}</td>
                <td class="px-3 py-2 font-mono text-xs text-slate-400">{{.PrivateIP}}</td>
                <td class="px-3 py-2 text-slate-400">{{.AZ}}</td>
            </tr>
            {{end}}
        </tbody>
    </table>
</div>
{{else}}
<div class="text-slate-500 p-4 text-sm">No running instances found for this profile.</div>
{{end}}
{{end}}
